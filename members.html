    <meta charset="UTF-8">

    <title>Club X - Members</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #0a0a0a;
        }

        /* NAVBAR */
        nav {
            background-color: #111;
            padding: 15px;
            text-align: center;
        }

        nav a {
            color: rgb(120, 120, 120);
            margin: 0 15px;
            text-decoration: none;
            font-size: 14px;
        }

        nav a:hover {
            color: #0a26df;
        }

        /* HERO */
        .hero {
            position: relative;
            width: 100%;
            height: 500px;
            overflow: hidden;
        }

        .bg-video {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .logo {
            position: absolute;
            top: 25%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 350px;
            z-index: 2;
            animation: glowPulse 3s infinite alternate;
        }

        .logo:hover {
            transform: translate(-50%, -55%) scale(1.05);
            filter: drop-shadow(0px 25px 40px rgb(255, 0, 0));
        }

        @keyframes glowPulse {
            from {
                filter: drop-shadow(0 0 20px rgba(255, 0, 0, 0.6));
            }

            to {
                filter: drop-shadow(0 0 60px rgb(255, 255, 255));
            }
        }

        /* GALLERY GRID */
        .gallery {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 20px;
        }

        .gallery h2 {
            grid-column: span 2;
            color: white;
            text-align: center;
        }

        /* MEMBER CARD */
        .member {
            position: relative;
            overflow: hidden;
        }

        .member-img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            display: block;
        }

        /* HANDLE OVERLAY */
        .handle {
            position: absolute;
            bottom: 12%;
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            width: 70%;
            opacity: 0;
            transition: 0.3s ease;
            z-index: 2;
        }

        /* HOVER EFFECT */
        .member:hover .handle {
            opacity: 1;
            transform: translateX(-50%) scale(1);
            filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.8));
        }

        /* DARK OVERLAY */
        .member::after {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            opacity: 0;
            transition: 0.3s;
        }

        .member:hover::after {
            opacity: 1;
        }

        /* MOBILE FIX */
        @media (max-width: 600px) {
            .gallery {
                grid-template-columns: 1fr;
            }

            .gallery h2 {
                grid-column: span 1;
            }
        }

        /* FOOTER */
        footer {
            background: #111;
            color: white;
            text-align: center;
            padding: 20px;
            font-size: 12px;
        }
    </style>
</head>
