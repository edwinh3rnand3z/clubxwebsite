<!DOCTYPE html>
<html lang="en">


<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy"
      content="default-src 'self';
               img-src 'self' https: data:;
               script-src 'self' https://cdn.jsdelivr.net 'unsafe-inline';
               style-src 'self' https://fonts.googleapis.com 'unsafe-inline';
               font-src https://fonts.gstatic.com;">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Club X</title>
    <link rel="stylesheet" href="style.css">


    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #0b0000;
            color: white;
        }


        /* NAVBAR */
        nav {
            background-color: #111;
            padding: 15px;
            text-align: center;
        }


        nav a {
            color: rgb(150, 150, 150);
            margin: 0 15px;
            text-decoration: none;
            font-size: 14px;
        }


        nav a:hover {
            color: #0a26df;
        }


        /* HERO */
        .hero {
            position: relative;
            width: 100%;
        }


        .hero img.bg {
            width: 100%;
            height: 400px;
            object-fit: cover;
            display: block;
            opacity: 0.6;
        }


        .hero img.logo {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 500px;
            max-width: 70%;
            animation: glowPulse 3s infinite alternate;
        }


        @keyframes glowPulse {
            from {
                filter: drop-shadow(0 0 20px rgba(255, 0, 0, 0.6));
            }


            to {
                filter: drop-shadow(0 0 60px rgb(255, 255, 255));
            }
        }


        /* CONTACT SECTION */
        .content {
            text-align: center;
            padding: 50px 20px;
        }


        .content h1 {
            font-size: 36px;
            margin-bottom: 10px;
        }


        .content p {
            color: #bbb;
            margin-bottom: 30px;
        }


        .contact-box {
            background: #111;
            padding: 25px;
            border-radius: 12px;
            max-width: 400px;
            margin: auto;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.2);
        }


        .contact-box a {
            display: block;
            margin: 10px 0;
            color: white;
            text-decoration: none;
            font-size: 16px;
            transition: 0.3s;
        }


        .contact-box a:hover {
            color: #0a26df;
        }


        /* FOOTER */
        footer {
            background: #111;
            text-align: center;
            padding: 20px;
            font-size: 12px;
            margin-top: 40px;
        }
    </style>
</head>


<body>


    <!-- HERO -->
    <div class="hero">
        <img src="images/car23.webp" alt="Car" class="bg">


        <a href="https://www.instagram.com/officialclubx" target="_blank">
            <img src="images/clubxlogo.PNG" alt="Club X" class="logo">
        </a>
    </div>


    <!-- NAV -->
    <nav>
        <a href="index.html">HOME</a>
        <a href="events.html">EVENTS</a>
        <a href="merch.html">MERCH</a>
        <a href="members.html">MEMBERS</a>
        <a href="gallery.html">GALLERY</a>
        <a href="contact.html">CONTACT</a>
    </nav>


    <!-- CONTACT CONTENT -->
    <div class="content">
        <h1>Contact Us</h1>
        <p>Got questions, want to collab, or join the movement? Tap in below.</p>


        <div class="contact-box">
            <!-- EMAIL -->
            <a href="mailto:officialclubxsupport@gmail.com">
                📧 officialclubxsupport@gmail.com
            </a>


            <!-- INSTAGRAM -->
            <a href="https://www.instagram.com/officialclubx" target="_blank">
                📸 @officialclubx
            </a>
            <p>If you wanted to contact our other photographers:</p>
            <a href="https://www.instagram.com/skinlessmedia" target="_blank">
                📸 @skinlessmedia
            </a>
            <a href="https://www.instagram.com/evan_flicks.ca" target="_blank">
                📸 @evan_flicks.ca
        </div>


    </div>


    <!-- FOOTER -->
    <footer>
        © 2026 Club X
    </footer>


</body>


</html>
