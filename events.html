<!DOCTYPE html>
<html lang="en">


<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
      content="default-src 'self';
               img-src 'self' https: data:;
               script-src 'self' https://cdn.jsdelivr.net 'unsafe-inline';
               style-src 'self' https://fonts.googleapis.com 'unsafe-inline';
               font-src https://fonts.gstatic.com;">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <title>Club X</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #000;
            color: white;
        }

        nav {
            background-color: #111;
            padding: 15px;
            text-align: center;
        }

        nav a {
            color: #aaa;
            margin: 0 15px;
            text-decoration: none;
            font-size: 14px;
            transition: 0.3s;
        }

        nav a:hover {
            color: white;
        }
/* COMING SOON SECTION */
        .coming-soon {
            height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .coming-soon h1 {
            color: white;
            font-size: 50px;
            letter-spacing: 10px;
            margin: 0;

            opacity: 0;
            transform: translateY(30px);

            animation: fadeSlide 1.5s ease forwards,
                glowPulse 2.5s infinite alternate 1.5s,
                flicker 3s infinite 2s;
        }

        .coming-soon p {
            color: gray;
            letter-spacing: 4px;
            margin-top: 15px;

            opacity: 0;
            animation: fadeSlide 1.5s ease forwards 0.5s;
        }

        /* ANIMATIONS */

        @keyframes fadeSlide {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes glowPulse {
            from {
                text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
            }

            to {
                text-shadow: 0 0 40px rgba(255, 255, 255, 0.6);
            }
        }

        @keyframes flicker {

            0%,
            18%,
            22%,
            25%,
            53%,
            57%,
            100% {
                opacity: 1;
            }

            20%,
            24%,
            55% {
                opacity: 0.4;
            }
        }
        .hero {
            position: relative;
            width: 100%;
            height: 500px;
            overflow: hidden;
        }

        .hero img.bg {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            filter: brightness(0.9);
        }

        .hero img.logo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 500px;
            max-width: 80%;
            animation: glowPulse 3s infinite alternate;
        }

        @keyframes glowPulse {
            from {
                filter: drop-shadow(0 0 15px rgba(255, 0, 0, 0.5));
            }
            to {
                filter: drop-shadow(0 0 35px white);
            }
        }

        .event-section {
            padding: 60px 20px;
            text-align: center;
        }

        .event-section h2 {
            font-size: 32px;
            letter-spacing: 4px;
        }

        .event-section p {
            color: #bbb;
            margin-bottom: 30px;
        }

        .event-card {
            max-width: 800px;
            margin: auto;
            background: #111;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.05);
            animation: fadeUp 1s ease, float 3s ease-in-out infinite alternate;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .event-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.12);
        }

        .event-card img {
            width: 100%;
            height: 350px;
            object-fit: cover;
        }

        .event-info {
            padding: 25px;
        }

        .event-btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background: white;
            color: black;
            text-decoration: none;
            border-radius: 25px;
            transition: 0.3s;
        }

        .event-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes float {
            from {
                transform: translateY(0);
            }
            to {
                transform: translateY(-8px);
            }
        }

        footer {
            background: #111;
            text-align: center;
            padding: 20px;
            font-size: 12px;
        }

        @media (max-width: 768px) {
            .hero {
                height: 350px;
            }

            .hero img.logo {
                width: 250px;
            }

            .event-card img {
                height: 220px;
            }

            nav a {
                margin: 0 8px;
                font-size: 12px;
            }
        }
    </style>
</head>

<body>


    <!-- HERO -->
    <div class="hero">
        <img src="images/car14.webp" class="bg" alt="Car">
        <img src="images/clubxlogo.PNG" class="logo" alt="Club X Logo">
    </div>


    <!-- NAV -->
    <nav>
        <a href="index.html">HOME</a>
        <a href="events.html">EVENTS</a>
        <a href="merch.html">MERCH</a>
        <a href="members.html">MEMBERS</a>
        <a href="gallery.html">GALLERY</a>
        <a href="contact.html">CONTACT</a>
    </nav>


    <!-- EVENT SECTION -->
    <section class="coming-soon">
        <h2>STAY TUNED FOR FUTURE EVENTS</h2>
   


     
                <a href="https://www.instagram.com/officialclubx" target="_blank" class="event-btn">
                    FOLLOW FOR EVENT DETAILS
                </a>
            </div>
        </div>
    </section>


    <!-- FOOTER -->
    <footer>
        © 2026 Club X
    </footer>


</body>


</html>
