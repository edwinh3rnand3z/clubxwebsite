<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club X</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        /* NAVBAR */
        nav {
            background-color: #111;
            padding: 15px;
            text-align: center;
        }

        nav a {
            color: rgb(74, 73, 73);
            margin: 0 15px;
            text-decoration: none;
            font-size: 14px;
        }

        nav a:hover {
            color: #0a26df;
        }

        .hero {
            position: relative;
            width: 100%;
        }

        .hero img.bg {
            width: 100%;
            height: 500px;
            object-fit: cover;
            display: block;
        }

        .hero img.logo {
            position: absolute;
            top: 25%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 500px;
            max-width: 70%;

            animation: glowPulse 3s infinite alternate;
        }

        .hero img.logo:hover {
            transform: translate(-50%, -55%) scale(1.05);
            filter: drop-shadow(0px 25px 40px rgb(255, 0, 0));
        }

        @keyframes glowPulse {
            from {
                filter: drop-shadow(0 0 20px rgba(255, 0, 0, 0.6));
            }

            to {
                filter: drop-shadow(0 0 60px rgb(255, 255, 255));
            }
        }
    </style>
</head>

<body>
    <div class="hero">
        <img src="images/DSC_0384.JPG" alt="Car" class="bg">

        <a href="https://www.instagram.com/officialclubx">
            <img src="images/clubxlogo.PNG" alt="Club X" class="logo">
        </a>
    </div>
    <nav>
        <a href="index.html">HOME</a>
        <a href="events.html">EVENTS</a>
        <a href="merch.html">MERCH</a>
        <a href="members.html">MEMBERS</a>
        <a href="gallery.html">GALLERY</a>
        <a href="contact.html">CONTACT</a>
    </nav>
</body>
