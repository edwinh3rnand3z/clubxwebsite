    <style>
        /* FOOTER */
        footer {
            background: #111;
            color: white;
            text-align: center;
            padding: 20px;
            font-size: 12px;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        /* NAVBAR */
        nav {
            background-color: #111;
            padding: 15px;
            text-align: center;
        }

        nav a {
            color: rgb(74, 73, 73);
            margin: 0 15px;
            text-decoration: none;
            font-size: 14px;
        }

        nav a:hover {
            color: #0a26df;
        }

        .hero {
            position: relative;
            width: 100%;
        }

        .hero img.bg {
            width: 100%;
            height: 500px;
            object-fit: cover;
            display: block;
        }

        .hero img.logo {
            position: absolute;
            top: 25%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 500px;
            max-width: 70%;

            animation: glowPulse 3s infinite alternate;
        }

        .hero img.logo:hover {
            transform: translate(-50%, -55%) scale(1.05);
            filter: drop-shadow(0px 25px 40px rgb(255, 0, 0));
        }

        @keyframes glowPulse {
            from {
                filter: drop-shadow(0 0 20px rgba(255, 0, 0, 0.6));
            }

            to {
                filter: drop-shadow(0 0 60px rgb(255, 255, 255));
            }
        }

        /* GALLERY */
        .gallery {
            column-count: 3;
            column-gap: 10px;
            padding: 15px;
        }

        .gallery img {
            width: 100%;
            margin-bottom: 10px;
            border-radius: 10px;
            display: block;
            break-inside: avoid;
            transition: 0.3s;
        }

        .gallery img:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
        }

        @media (max-width: 900px) {
            .gallery {
                column-count: 2;
            }
        }

        @media (max-width: 500px) {
            .gallery {
                column-count: 1;
            }
        }

        /* GALLERY */
        .gallery {
            column-count: 3;
            column-gap: 10px;
            padding: 15px;
        }

        /* WRAP EACH IMAGE */
        .card {
            position: relative;
            margin-bottom: 10px;
            break-inside: avoid;
            border-radius: 10px;
            overflow: hidden;
        }

        /* IMAGE */
        .card img {
            width: 100%;
            display: block;
            border-radius: 10px;
            transition: 0.3s;
        }

        /* DARK OVERLAY */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;

            background: rgba(0, 0, 0, 0.55);

            display: flex;
            align-items: center;
            justify-content: center;

            opacity: 0;
            transition: 0.4s;
        }

        /* TEXT */
        .overlay h3 {
            color: white;
            letter-spacing: 5px;
            font-size: 24px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        /* HOVER EFFECT */
        .card:hover img {
            transform: scale(1.03);
            filter: brightness(0.8);
        }

        .card:hover .overlay {
            opacity: 1;
        }

        /* MOBILE */
        @media (max-width: 900px) {
            .gallery {
                column-count: 2;
            }
        }

        @media (max-width: 500px) {
            .gallery {
                column-count: 1;
            }
        }

        .gallery {
            column-count: 3;
            column-gap: 10px;
            padding: 15px;
        }

        .card {
            position: relative;
            margin-bottom: 10px;
            break-inside: avoid;
            border-radius: 10px;
            overflow: hidden;
        }

        .card img,
        .card video {
            width: 100%;
            display: block;
            border-radius: 10px;
            transition: 0.3s;
            background: black;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.45);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: 0.4s;
            pointer-events: none;
        }

        .overlay h3 {
            color: white;
            letter-spacing: 5px;
            font-size: 24px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .card:hover img,
        .card:hover video {
            transform: scale(1.03);
            filter: brightness(0.8);
        }

        .card:hover .overlay {
            opacity: 1;
        }

        @media (max-width: 900px) {
            .gallery {
                column-count: 2;
            }
        }

        @media (max-width: 500px) {
            .gallery {
                column-count: 1;
            }
        }
    </style>
