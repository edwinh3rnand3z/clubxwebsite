    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #0a0a0a;
        }


        /* NAVBAR */
        nav {
            background-color: #111;
            padding: 15px;
            text-align: center;
        }


        nav a {
            color: rgb(120, 120, 120);
            margin: 0 15px;
            text-decoration: none;
            font-size: 14px;
        }


        nav a:hover {
            color: #0a26df;
        }


        /* HERO */
        .hero {
            position: relative;
            width: 100%;
            height: 500px;
            overflow: hidden;
        }


        .bg-video {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }


        .logo {
            position: absolute;
            top: 25%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 500px;
            z-index: 2;
            animation: glowPulse 3s infinite alternate;
        }


        .logo:hover {
            transform: translate(-50%, -55%) scale(1.05);
            filter: drop-shadow(0px 25px 40px rgb(255, 0, 0));
        }


        @keyframes glowPulse {
            from {
                filter: drop-shadow(0 0 20px rgba(255, 0, 0, 0.6));
            }


            to {
                filter: drop-shadow(0 0 60px rgb(255, 255, 255));
            }
        }


        /* 🔥 NEW GRID GALLERY */
        .gallery {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            padding: 20px;
            max-width: 1100px;
            margin: auto;
        }


        /* CARD */
        .card {
            position: relative;
            border-radius: 10px;
            overflow: hidden;
        }


        /* IMAGE + VIDEO */
        .card img,
        .card video {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
            transition: 0.3s;
            background: black;
        }


        /* OVERLAY */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);


            display: flex;
            align-items: center;
            justify-content: center;


            opacity: 0;
            transition: 0.4s;
        }


        .overlay h3 {
            color: white;
            letter-spacing: 5px;
            font-size: 20px;
        }


        /* HOVER */
        .card:hover img,
        .card:hover video {
            transform: scale(1.05);
            filter: brightness(0.8);
        }


        .card:hover .overlay {
            opacity: 1;
        }


        /* RESPONSIVE */
        @media (max-width: 900px) {
            .gallery {
                grid-template-columns: repeat(2, 1fr);
            }
        }


        @media (max-width: 500px) {
            .gallery {
                grid-template-columns: 1fr;
            }
        }


        /* FOOTER */
        footer {
            background: #111;
            color: white;
            text-align: center;
            padding: 20px;
            font-size: 12px;
        }
    </style>
</head>
