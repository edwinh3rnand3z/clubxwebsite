<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club X</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #0a0a0a;
        }

        /* NAVBAR */
        nav {
            background-color: #111;
            padding: 15px;
            text-align: center;
        }

        nav a {
            color: rgb(120, 120, 120);
            margin: 0 15px;
            text-decoration: none;
            font-size: 14px;
            letter-spacing: 2px;
        }

        nav a:hover {
            color: white;
        }

        /* HERO */
        .hero {
            position: relative;
            width: 100%;
        }

        .hero img.bg {
            width: 100%;
            height: 500px;
            object-fit: cover;
            display: block;
        }

        .hero img.logo {
            position: absolute;
            top: 25%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 500px;
            max-width: 70%;
            animation: glowLogo 3s infinite alternate;
        }

        .hero img.logo:hover {
            transform: translate(-50%, -55%) scale(1.05);
            filter: drop-shadow(0px 25px 40px rgb(255, 0, 0));
        }

        @keyframes glowLogo {
            from {
                filter: drop-shadow(0 0 20px rgba(255, 0, 0, 0.6));
            }

            to {
                filter: drop-shadow(0 0 60px rgb(255, 255, 255));
            }
        }

        /* COMING SOON SECTION */
        .coming-soon {
            height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .coming-soon h1 {
            color: white;
            font-size: 50px;
            letter-spacing: 10px;
            margin: 0;

            opacity: 0;
            transform: translateY(30px);

            animation: fadeSlide 1.5s ease forwards,
                glowPulse 2.5s infinite alternate 1.5s,
                flicker 3s infinite 2s;
        }

        .coming-soon p {
            color: gray;
            letter-spacing: 4px;
            margin-top: 15px;

            opacity: 0;
            animation: fadeSlide 1.5s ease forwards 0.5s;
        }

        /* ANIMATIONS */

        @keyframes fadeSlide {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes glowPulse {
            from {
                text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
            }

            to {
                text-shadow: 0 0 40px rgba(255, 255, 255, 0.6);
            }
        }

        @keyframes flicker {

            0%,
            18%,
            22%,
            25%,
            53%,
            57%,
            100% {
                opacity: 1;
            }

            20%,
            24%,
            55% {
                opacity: 0.4;
            }
        }

        /* MOBILE */
        @media (max-width: 768px) {
            .coming-soon h1 {
                font-size: 32px;
            }
        }

        /* FOOTER */
        footer {
            background: #111;
            color: white;
            text-align: center;
            padding: 20px;
            font-size: 12px;
        }
    </style>

</head>

<body>

    <!-- HERO -->
    <div class="hero">
        <img src="images/DSC_0384.JPG" alt="Car" class="bg">

        <a href="https://www.instagram.com/officialclubx">
            <img src="images/clubxlogo.PNG" alt="Club X" class="logo">
        </a>
    </div>

    <!-- NAVBAR -->
    <nav>
        <a href="index.html">HOME</a>
        <a href="events.html">EVENTS</a>
        <a href="merch.html">MERCH</a>
        <a href="members.html">MEMBERS</a>
        <a href="gallery.html">GALLERY</a>


        <!-- COMING SOON -->
        <div class="coming-soon">
            <h1>COMING SOON</h1>
            <p>CLUB X MERCH</p>
        </div>
        <!-- FOOTER -->
        <footer>
            © 2026 Club X
        </footer>

</body>

</html>
