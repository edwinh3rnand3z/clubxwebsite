<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club X</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        /* NAVBAR */
        nav {
            background-color: #111;
            padding: 15px;
            text-align: center;
        }

        nav a {
            color: rgb(74, 73, 73);
            margin: 0 15px;
            text-decoration: none;
            font-size: 14px;
        }

        nav a:hover {
            color: #0a26df;
        }

        header {
            text-align: center;
        }

        /* HERO SECTION */
        .hero {
            position: relative;
            width: 100%;
        }

        .hero img.bg {
            width: 100%;
            height: 500px;
            object-fit: cover;
            display: block;
        }

        .hero img.logo {
            position: absolute;
            top: 25%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 500px;
            max-width: 70%;

            animation: glowPulse 3s infinite alternate;
        }

        .hero img.logo:hover {
            transform: translate(-50%, -55%) scale(1.05);
            filter: drop-shadow(0px 25px 40px rgb(255, 0, 0));
        }

        @keyframes glowPulse {
            from {
                filter: drop-shadow(0 0 20px rgba(255, 0, 0, 0.6));
            }

            to {
                filter: drop-shadow(0 0 60px rgb(255, 255, 255));
            }
        }

        /* SECTION */
        .container {
            max-width: 1000px;
            margin: auto;
            background: white;
            padding: 30px;
        }

        h2 {
            border-bottom: 2px solid #ddd;
            padding-bottom: 10px;
        }

        /* GALLERY */
        .gallery {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 20px;
        }

        .gallery img {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        /* FOOTER */
        footer {
            background: #111;
            color: white;
            text-align: center;
            padding: 20px;
            font-size: 12px;
        }
    </style>
</head>

<body>

    <!-- NAV -->


    <header>

        <!-- HERO -->
        <div class="hero">
            <img src="images/clubx.jpeg" alt="Car" class="bg">

            <a href="https://www.instagram.com/officialclubx">
                <img src="images/clubxlogo.PNG" alt="Club X" class="logo">
            </a>
        </div>

    </header>
    <nav>
        <a href="#">HOME</a>
        <a href="events.html">EVENTS</a>
        <a href="merch.html">MERCH</a>
        <a href="members.html">MEMBERS</a>
        <a href="gallery.html">GALLERY</a>
        <a href="contact.html">CONTACT</a>
    </nav>

    <!-- CONTENT -->
    <div class="container">
        <h2>About Club X</h2>
        <video width="100%" controls>
            <source src="videos/Timeline 1 2.MOV" type="video/mp4">
            Your browser does not support the video tag.
            <p>

            </p>
    </div>

    <!-- GALLERY -->
    <div class="gallery">
        <img src="images/DSC_0384.JPG">
        <img src="images/SON03637.JPG">
        <img src="images/SON04375.jpeg">
        <img src="images/SON04385.JPG">

    </div>
    <video width="100%" controls>
        <source src="videos/Untitleduu.mov" type="video/mp4">
        Your browser does not support the video tag.

        <!-- FOOTER -->
        <footer>
            © 2026 Club X
        </footer>

</body>

</html>
