<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club X</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        /* NAVBAR */
        nav {
            background-color: #111;
            padding: 15px;
            text-align: center;
        }

        nav a {
            color: rgb(74, 73, 73);
            margin: 0 15px;
            text-decoration: none;
            font-size: 14px;
        }

        nav a:hover {
            color: #0a26df;
        }

        header {
            text-align: center;
        }

        /* HERO SECTION */
        .hero {
            position: relative;
            width: 100%;
        }

        .hero img.bg {
            width: 100%;
            height: 500px;
            object-fit: cover;
            display: block;
        }

        .hero img.logo {
            position: absolute;
            top: 25%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 350px;
            max-width: 70%;
        }

        /* SECTION */
        .container {
            max-width: 1000px;
            margin: auto;
            background: white;
            padding: 30px;
        }

        h2 {
            border-bottom: 2px solid #ddd;
            padding-bottom: 10px;
        }

        /* GALLERY */
        .gallery {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 20px;
        }

        .gallery img {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        /* FOOTER */
        footer {
            background: #111;
            color: white;
            text-align: center;
            padding: 20px;
            font-size: 12px;
        }
    </style>
</head>

<body>

    <!-- NAV -->
    <nav>
        <a href="#">HOME</a>
        <a href="#">ABOUT</a>
        <a href="#">EVENTS</a>
        <a href="#">GALLERY</a>
        <a href="#">CONTACT</a>
    </nav>

    <header>

        <!-- HERO -->
        <div class="hero">
            <img src="images/clubx.jpeg" alt="Car" class="bg">

            <a href="https://www.instagram.com/officialclubx">
                <img src="images/clubxlogo.PNG" alt="Club X" class="logo">
            </a>
        </div>

    </header>

    <!-- CONTENT -->
    <div class="container">
        <h2>About Club X</h2>
        <p>

        </p>
    </div>

    <!-- GALLERY -->
    <div class="gallery">
        <img src="images/DSC_0384.JPG">
        <img src="images/SON03637.JPG">
        <img src="images/SON04375.jpeg">
        <img src="images/SON04385.JPG">

    </div>

    <!-- FOOTER -->
    <footer>
        © 2026 Club X
    </footer>

</body>

</html>
